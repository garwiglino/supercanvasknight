<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="480" height="270">
  <defs>
    <linearGradient id="dungeon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0a0808"/>
      <stop offset="100%" stop-color="#151010"/>
    </linearGradient>
    <radialGradient id="torch1" cx="15%" cy="50%" r="20%">
      <stop offset="0%" stop-color="#ff8800" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="torch2" cx="85%" cy="50%" r="20%">
      <stop offset="0%" stop-color="#ff8800" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#ff8800" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="270" fill="url(#dungeon)"/>
  <rect width="480" height="270" fill="url(#torch1)"/>
  <rect width="480" height="270" fill="url(#torch2)"/>
  <!-- Mur briques fond -->
  <rect x="0" y="0" width="480" height="270" fill="none" stroke="#1e1414" stroke-width="0"/>
  <!-- Rangées de briques -->
  <g fill="none" stroke="#1e1414" stroke-width="1" opacity="0.7">
    <line x1="0" y1="30" x2="480" y2="30"/>
    <line x1="0" y1="60" x2="480" y2="60"/>
    <line x1="0" y1="90" x2="480" y2="90"/>
    <line x1="0" y1="120" x2="480" y2="120"/>
    <line x1="0" y1="150" x2="480" y2="150"/>
    <line x1="0" y1="180" x2="480" y2="180"/>
    <line x1="0" y1="210" x2="480" y2="210"/>
    <line x1="0" y1="240" x2="480" y2="240"/>
    <!-- Colonnes briques décalées -->
    <line x1="60" y1="0" x2="60" y2="30"/><line x1="120" y1="0" x2="120" y2="30"/><line x1="180" y1="0" x2="180" y2="30"/>
    <line x1="240" y1="0" x2="240" y2="30"/><line x1="300" y1="0" x2="300" y2="30"/><line x1="360" y1="0" x2="360" y2="30"/><line x1="420" y1="0" x2="420" y2="30"/>
    <line x1="30" y1="30" x2="30" y2="60"/><line x1="90" y1="30" x2="90" y2="60"/><line x1="150" y1="30" x2="150" y2="60"/>
    <line x1="210" y1="30" x2="210" y2="60"/><line x1="270" y1="30" x2="270" y2="60"/><line x1="330" y1="30" x2="330" y2="60"/><line x1="390" y1="30" x2="390" y2="60"/><line x1="450" y1="30" x2="450" y2="60"/>
    <line x1="60" y1="60" x2="60" y2="90"/><line x1="120" y1="60" x2="120" y2="90"/><line x1="180" y1="60" x2="180" y2="90"/>
    <line x1="240" y1="60" x2="240" y2="90"/><line x1="300" y1="60" x2="300" y2="90"/><line x1="360" y1="60" x2="360" y2="90"/><line x1="420" y1="60" x2="420" y2="90"/>
    <line x1="30" y1="90" x2="30" y2="120"/><line x1="90" y1="90" x2="90" y2="120"/><line x1="150" y1="90" x2="150" y2="120"/>
    <line x1="210" y1="90" x2="210" y2="120"/><line x1="270" y1="90" x2="270" y2="120"/><line x1="330" y1="90" x2="330" y2="120"/><line x1="390" y1="90" x2="390" y2="120"/><line x1="450" y1="90" x2="450" y2="120"/>
  </g>
  <!-- Torches -->
  <!-- Torche gauche -->
  <rect x="58" y="110" width="8" height="25" rx="2" fill="#6b3a1a"/>
  <path d="M58,110 Q62,90 66,110 Q60,100 58,110" fill="#ff8800"/>
  <path d="M59,108 Q62,92 65,108 Q61,99 59,108" fill="#ffcc00"/>
  <!-- Torche droite -->
  <rect x="414" y="110" width="8" height="25" rx="2" fill="#6b3a1a"/>
  <path d="M414,110 Q418,90 422,110 Q416,100 414,110" fill="#ff8800"/>
  <path d="M415,108 Q418,92 421,108 Q417,99 415,108" fill="#ffcc00"/>
  <!-- Barreaux prison -->
  <line x1="200" y1="0" x2="200" y2="270" stroke="#2a1a1a" stroke-width="6" opacity="0.5"/>
  <line x1="220" y1="0" x2="220" y2="270" stroke="#2a1a1a" stroke-width="6" opacity="0.5"/>
  <line x1="240" y1="0" x2="240" y2="270" stroke="#2a1a1a" stroke-width="6" opacity="0.5"/>
  <line x1="260" y1="0" x2="260" y2="270" stroke="#2a1a1a" stroke-width="6" opacity="0.5"/>
  <line x1="280" y1="0" x2="280" y2="270" stroke="#2a1a1a" stroke-width="6" opacity="0.5"/>
  <line x1="190" y1="60" x2="290" y2="60" stroke="#2a1a1a" stroke-width="6" opacity="0.5"/>
  <line x1="190" y1="200" x2="290" y2="200" stroke="#2a1a1a" stroke-width="6" opacity="0.5"/>
  <!-- Crâne -->
  <ellipse cx="240" cy="135" rx="22" ry="24" fill="#2a2020" opacity="0.7"/>
  <ellipse cx="232" cy="138" rx="6" ry="7" fill="#0a0808" opacity="0.8"/>
  <ellipse cx="248" cy="138" rx="6" ry="7" fill="#0a0808" opacity="0.8"/>
  <!-- Contour -->
  <rect x="0" y="0" width="480" height="270" fill="none" stroke="#3a2020" stroke-width="4"/>
  <rect x="6" y="6" width="468" height="258" fill="none" stroke="#ff8800" stroke-width="1.5" opacity="0.3"/>
</svg>
