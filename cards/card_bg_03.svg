<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 270" width="480" height="270">
  <defs>
    <linearGradient id="lava" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0500"/>
      <stop offset="50%" stop-color="#2a0800"/>
      <stop offset="100%" stop-color="#4a0a00"/>
    </linearGradient>
    <radialGradient id="lava1" cx="20%" cy="80%" r="30%">
      <stop offset="0%" stop-color="#ff4400"/>
      <stop offset="60%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#8b0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lava2" cx="70%" cy="90%" r="35%">
      <stop offset="0%" stop-color="#ff6600"/>
      <stop offset="60%" stop-color="#cc2200"/>
      <stop offset="100%" stop-color="#8b0000" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="lava3" cx="45%" cy="100%" r="40%">
      <stop offset="0%" stop-color="#ff8800"/>
      <stop offset="70%" stop-color="#8b0000"/>
      <stop offset="100%" stop-color="#8b0000" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="480" height="270" fill="url(#lava)"/>
  <rect width="480" height="270" fill="url(#lava1)"/>
  <rect width="480" height="270" fill="url(#lava2)"/>
  <rect width="480" height="270" fill="url(#lava3)"/>
